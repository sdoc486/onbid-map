<style>

/* 필터 슬라이더 */
#f-disc{width:100%;accent-color:#1a73e8;cursor:pointer;}
#f-sort{width:100%;border:1px solid #ddd;border-radius:4px;padding:4px 6px;font-size:12px;font-family:inherit;}

/* detail */

#detail-hdr{display:none;justify-content:flex-end;padding:4px 6px 0;position:sticky;top:0;background:#fafafa;z-index:1;}
#detail-close{background:none;border:1px solid #ddd;border-radius:3px;font-size:13px;cursor:pointer;color:#888;padding:1px 6px;line-height:1.4;}
#detail-close:hover{color:#333;border-color:#999;}
#detail-content{padding:0 12px 10px;}
.d-ph{padding:20px;text-align:center;color:#ccc;font-size:12px;}
.d-title{font-size:13px;font-weight:bold;margin-bottom:7px;color:#1a1a2e;line-height:1.3;}
.d-row{display:flex;padding:3px 0;border-bottom:1px solid #f0f0f0;font-size:11px;}
.d-lbl{color:#999;width:82px;flex-shrink:0;}
.d-val{flex:1;color:#222;word-break:break-all;}
.bar-bg{background:#e0e0e0;border-radius:3px;height:6px;margin:4px 0 2px;}
.bar-fg{background:#1a73e8;height:6px;border-radius:3px;}
.btn-ob{display:block;text-align:center;background:#1a73e8;color:#fff;padding:7px;border-radius:4px;text-decoration:none;margin-top:9px;font-size:12px;font-weight:bold;}

<body data-tab="map">

<div id="pw-overlay" style="display:none;">
  <div id="pw-box">
    <div id="pw-title">온비드 부동산 공매</div>
    <div id="pw-sub">접근하려면 비밀번호를 입력하세요</div>
    <input id="pw-input" type="password" placeholder="비밀번호"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-err"></div>
    <button id="pw-btn" onclick="checkPw()">입장</button>
  </div>
</div>
<script>
(function() {
  var PW = '260331';
  if (!PW) return;
  if (sessionStorage.getItem('onbid_auth') === PW) return;
  var overlay = document.getElementById('pw-overlay');
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  window.checkPw = function() {
    var v = document.getElementById('pw-input').value;
    if (v === PW) {
      sessionStorage.setItem('onbid_auth', PW);
      overlay.style.display = 'none';
      document.body.style.overflow = '';
    } else {
      document.getElementById('pw-err').textContent = '비밀번호가 틀렸습니다';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  };
  setTimeout(function() { document.getElementById('pw-input').focus(); }, 100);
})();
</script>

/* ── 필터 초기화 ──────────────────────────────── */
function buildCbs(elId, values, cls) {
  const el = document.getElementById(elId);
  el.innerHTML = '';
  values.forEach(v => {
    const lbl = document.createElement('label');
    lbl.className = 'cb-item';
    lbl.innerHTML = '<input type="checkbox" class="' + cls + '" value="' + esc(v) + '" checked> ' + esc(v);
    el.appendChild(lbl);
  });
}

const COLOR_META = [
  {value:'orange', label:'오늘신규', color:'#e67e22'},
  {value:'purple', label:'7일이내',  color:'#9b30ff'},
  {value:'blue',   label:'진행중',   color:'#1a73e8'},
  {value:'red',    label:'30일내',   color:'#e74c3c'},
  {value:'coral',  label:'60일내',   color:'#ff6b47'},
  {value:'amber',  label:'90일내',   color:'#c8a000'},
  {value:'gold',   label:'낙찰완료', color:'#f0b429'},

];

function initFilters() {
  // 일정분류 (고정 항목)
  const fc = document.getElementById('f-color');
  fc.innerHTML = '';
  COLOR_META.forEach(c => {
    const lbl = document.createElement('label');
    lbl.className = 'cb-item';
    lbl.innerHTML = '<input type="checkbox" class="cb-color" value="' + c.value + '" checked>'
      + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'
      + c.color + ';margin:0 3px 0 2px;flex-shrink:0;"></span>' + c.label;
    fc.appendChild(lbl);
  });

  const stats = [...new Set(ITEMS.map(i=>i.status).filter(Boolean))].sort();
  const use2s = [...new Set(ITEMS.map(i=>i.use_lv2).filter(Boolean))].sort();
  buildCbs('f-type',   types, 'cb-type');
  buildCbs('f-status', stats, 'cb-status');
  buildCbs('f-use2',   use2s, 'cb-use2');
}

/* ── 필터 적용 ────────────────────────────────── */
function applyFilter() {
  const colors   = [...document.querySelectorAll('.cb-color:checked')].map(e=>e.value);
  const types    = [...document.querySelectorAll('.cb-type:checked')].map(e=>e.value);
  const stats    = [...document.querySelectorAll('.cb-status:checked')].map(e=>e.value);
  const use2s    = [...document.querySelectorAll('.cb-use2:checked')].map(e=>e.value);
  const minA     = (parseFloat(document.getElementById('f-min').value)||0) * 1e8;
  const maxA     = (parseFloat(document.getElementById('f-max').value)||0) * 1e8;
  const minDisc  = parseFloat(document.getElementById('f-disc').value) || 0;
  filtered = ITEMS.filter(i => {
    if (colors.length && !colors.includes(i.color))    return false;
    if (types.length  && !types.includes(i.prpt_type)) return false;
    if (stats.length  && !stats.includes(i.status))    return false;
    if (use2s.length  && !use2s.includes(i.use_lv2))   return false;
    if (minA > 0 && (i.appraisal||0) < minA) return false;
    if (maxA > 0 && (i.appraisal||0) > maxA) return false;
    if (minDisc > 0) { const dr = discRate(i); if (dr == null || dr < minDisc) return false; }
    return true;
  });
  renderAll();
}

function resetFilter() {
  document.getElementById('f-min').value = '';
  document.getElementById('f-max').value = '';
  document.getElementById('f-disc').value = 0;
  document.getElementById('f-disc-val').textContent = '0';
  document.getElementById('f-sort').value = 'date';
  document.querySelectorAll('.cb-color,.cb-type,.cb-status,.cb-use2').forEach(cb=>cb.checked=true);
  filtered = ITEMS.slice();
  renderAll();
}

/* ── 목록 렌더링 ──────────────────────────────── */
function renderList(items) {
  const sortEl = document.getElementById('f-sort');
  const sortBy = sortEl ? sortEl.value : 'date';
  const sorted = [...items].sort((a, b) => {
    if (sortBy === 'disc') {
      const da = discRate(a), db = discRate(b);
      if (da == null && db == null) return 0;
      if (da == null) return 1;
      if (db == null) return -1;
      return db - da;
    }
    if (sortBy === 'appraisal') return (b.appraisal || 0) - (a.appraisal || 0);
    if (!a.bid_start && !b.bid_start) return 0;
    if (!a.bid_start) return 1;
    if (!b.bid_start) return -1;
    return a.bid_start.localeCompare(b.bid_start);
  });
  document.getElementById('item-list').innerHTML = sorted.map(it => {
    const col = COLORS[it.color] || '#555';
    const dateStr = it.bid_start
      ? it.bid_start.slice(0,10) + ' ~ ' + (it.bid_end ? it.bid_end.slice(0,10) : '-')
      : '';
    const price = it.min_bid ? fmtAmt(it.min_bid) : (it.min_bid_str || '-');
    const dr = discRate(it);
    const dc = discColor(dr);
    const badge = dr != null
      ? '<span class="disc-badge" style="background:' + dc + ';color:#fff">-' + dr.toFixed(0) + '%</span>'
      : '';
    const progPct = (it.appraisal && it.min_bid)
      ? Math.max(0, Math.min(100, it.min_bid / it.appraisal * 100)).toFixed(1) : '0';
    const prog = (it.appraisal && it.min_bid)
      ? '<div class="c-prog-bg"><div class="c-prog-fg" style="width:' + progPct + '%;background:' + dc + '"></div></div>'
      : '';
    return '<div class="card' + (it.id===selId?' sel':'') + '" id="card-' + it.id + '" onclick="selectItem(' + it.id + ')">'
      + '<div class="c-bar" style="background:' + col + '"></div>'
      + '<div class="c-body">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:4px;">'
      + '<div class="c-name" style="flex:1;min-width:0;">' + esc(it.name) + '</div>'
      + badge
      + '</div>'
      + '<div class="c-meta">' + esc(it.sido) + ' ' + esc(it.sigungu) + ' &middot; ' + esc(it.prpt_type) + ' &middot; ' + esc(it.status) + '</div>'
      + '<div class="c-price">감정가 ' + fmtAmt(it.appraisal) + ' / 최저 ' + price + '</div>'
      + prog
      + '<div class="c-meta">' + esc(dateStr) + '</div>'
      + '</div></div>';
  }).join('');
}

/* ── 마커 ─────────────────────────────────────── */
function mkImg(color) {
  const mobile = window.innerWidth <= 768;
  const w = mobile ? 28 : 22, h = mobile ? 38 : 30;
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 22 30">'
    + '<path d="M11 0C4.9 0 0 4.9 0 11c0 7.7 11 19 11 19s11-11.3 11-19C22 4.9 17.1 0 11 0z" fill="' + color + '"/>'
    + '<circle cx="11" cy="11" r="4.5" fill="white" fill-opacity="0.9"/>'
    + '</svg>';
  return new kakao.maps.MarkerImage(
    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
    new kakao.maps.Size(w, h),
    {offset: new kakao.maps.Point(w/2, h)}
  );
}

function clearMarkers() {
  markers.forEach(m=>m.setMap(null));
  tips.forEach(t=>t.setMap(null));

}

function mkStarImg() {
  const mobile = window.innerWidth <= 768;

    + '<polygon points="12,2 15.1,8.5 22,9.5 17,14.4 18.2,21.3 12,18 5.8,21.3 7,14.4 2,9.5 8.9,8.5" '

    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),

    {offset: new kakao.maps.Point(w/2, h/2)}
  );
}

function clearLttrsMarkers() {
  lttrsMarkers.forEach(m=>m.setMap(null));

}

function renderLttrsMarkers() {

    if (!it.lat || !it.lng) return;

    const mk = new kakao.maps.Marker({ position: pos, image: img, map: map });

      content: '<div style="background:rgba(180,120,0,.9);color:#fff;padding:3px 8px;border-radius:4px;font-size:11px;white-space:nowrap;pointer-events:none;font-family:Malgun Gothic,sans-serif;">★ ' + esc(it.name) + '</div>',

/* ── 선택 ─────────────────────────────────────── */
function selectItem(id) {
  selId = id;
  const it = ITEMS.find(i=>i.id===id);
  if (!it) return;
  document.querySelectorAll('.card').forEach(el=>el.classList.remove('sel'));
  const card = document.getElementById('card-'+id);
  if (card) { card.classList.add('sel'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  if (map && it.lat && it.lng) map.panTo(new kakao.maps.LatLng(it.lat, it.lng));
  if (isMobile()) { switchTab('map'); openSheet(it); } else { showDetail(it); }
}

  updateStats(filtered);
  renderList(filtered);
  renderMarkers(filtered);
  renderLttrsMarkers();
  renderPvctMarkers();
  if (isMobile()) updateApplyCount();
}

/* ── 데이터 렌더 (지도와 독립) ────────────────── */
function initData() {
  initFilters();
  updateStats(ITEMS);
  renderList(ITEMS);
  if (isMobile()) {
    document.body.setAttribute('data-tab', 'map');
    buildChips();
    updateApplyCount();
  }
}

/* ── 지도 초기화 ──────────────────────────────── */
function initMap() {
  if (typeof kakao === 'undefined' || !kakao.maps) {
    document.getElementById('map').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:8px;color:#999;font-size:13px;">'
      + '<div>카카오 지도를 불러오지 못했습니다.</div>'
      + '<div style="font-size:11px;">카카오 개발자센터에서 JavaScript 키의 허용 도메인에<br>이 파일의 경로 또는 localhost를 추가하세요.</div>'
      + '</div>';
    return;
  }
  kakao.maps.load(function() {
    map = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(37.5665, 126.9780),
      level: 10,
    });
    renderMarkers(filtered);
    renderLttrsMarkers();
    renderPvctMarkers();
    if (isMobile()) setTimeout(function(){ kakao.maps.event.trigger(map,'resize'); }, 100);
  });
}

/* ── 로드뷰 ───────────────────────────────────── */
var rvOn = false, rvClient = null, rvObj = null, rvMarker = null, rvListener = null;

function toggleRV() {
  rvOn = !rvOn;
  var btn   = document.getElementById('rv-btn');
  var panel = document.getElementById('rv-panel');
  var badge = document.getElementById('rv-hint-badge');
  var mapEl = document.getElementById('map');

  if (rvOn) {
    btn.classList.add('active');
    panel.style.display = 'flex';
    badge.style.display = 'block';
    mapEl.style.cursor = 'crosshair';

    if (!rvClient) {
      rvClient = new kakao.maps.RoadviewClient();
      rvObj    = new kakao.maps.Roadview(document.getElementById('roadview'));
    }
    rvListener = kakao.maps.event.addListener(map, 'click', function(e) {
      showRV(e.latLng);
    });
  } else {
    btn.classList.remove('active');
    panel.style.display = 'none';
    badge.style.display = 'none';
    mapEl.style.cursor = '';
    if (rvListener) { kakao.maps.event.removeListener(rvListener); rvListener = null; }
    if (rvMarker)   { rvMarker.setMap(null); rvMarker = null; }
  }
}

function showRV(latlng) {
  document.getElementById('rv-hint-badge').style.display = 'none';
  rvClient.getNearestPanoId(latlng, 50, function(panoId) {
    var label = document.getElementById('rv-label');
    if (panoId === null) {
      label.textContent = '⚠ 해당 위치에 로드뷰가 없습니다 (반경 50m)';
    } else {
      rvObj.setPanoId(panoId, latlng);
      label.textContent = '📷 로드뷰';
      if (!rvMarker) {
        rvMarker = new kakao.maps.Marker({ map: map, position: latlng });
      } else {
        rvMarker.setPosition(latlng);
      }
    }
  });
}

/* ── 지적편집도 ───────────────────────────────── */
var cadastralOn = false;
function toggleCadastral() {
  if (!map) return;
  cadastralOn = !cadastralOn;
  var btn = document.getElementById('cadastral-btn');
  if (cadastralOn) {
    map.addOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);
    btn.classList.add('active');
  } else {
    map.removeOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);
    btn.classList.remove('active');
  }
}

/* ── 위성지도 ─────────────────────────────────── */
var satelliteOn = false;
function toggleSatellite() {
  if (!map) return;
  satelliteOn = !satelliteOn;
  var btn = document.getElementById('satellite-btn');
  if (satelliteOn) {
    map.setMapTypeId(kakao.maps.MapTypeId.HYBRID);
    btn.classList.add('active');
    btn.textContent = '🗺 일반지도';
  } else {
    map.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);
    btn.classList.remove('active');
    btn.textContent = '🛰 위성지도';
  }
}

/* ── 주소 검색 ────────────────────────────────── */
var _searchMarker = null;
var _searchIw = null;

function searchAddr() {
  var q = document.getElementById('map-search-input').value.trim();
  var msg = document.getElementById('map-search-msg');
  msg.style.display = 'none';
  if (!q || !map) return;

  function showMsg(txt) {
    msg.textContent = txt;
    msg.style.display = 'block';
    setTimeout(function(){ msg.style.display = 'none'; }, 3000);
  }

  function placeSearchMarker(lat, lng, label) {
    if (_searchMarker) _searchMarker.setMap(null);
    if (_searchIw) _searchIw.close();
    var pos = new kakao.maps.LatLng(lat, lng);
    _searchMarker = new kakao.maps.Marker({ position: pos, map: map });
    _searchIw = new kakao.maps.InfoWindow({
      content: '<div style="padding:5px 10px;font-size:12px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;">' + label + '</div>',
      removable: true
    });
    _searchIw.open(map, _searchMarker);
    map.setCenter(pos);
    map.setLevel(4);
    kakao.maps.event.addListener(_searchMarker, 'click', function() {
      _searchIw.open(map, _searchMarker);
    });
  }

  // 1차: 주소 검색
  var gc = new kakao.maps.services.Geocoder();
  gc.addressSearch(q, function(result, status) {
    if (status === kakao.maps.services.Status.OK) {
      placeSearchMarker(result[0].y, result[0].x, result[0].address_name || q);
    } else {
      // 2차: 키워드(장소명) 검색
      var ps = new kakao.maps.services.Places();
      ps.keywordSearch(q, function(data, status2) {
        if (status2 === kakao.maps.services.Status.OK) {
          placeSearchMarker(data[0].y, data[0].x, data[0].place_name || q);
        } else {
          showMsg('검색 결과가 없습니다: ' + q);
        }
      });
    }
  });
}

/* ── 모바일 유틸 / 탭 ─────────────────────────── */
function isMobile() { return window.innerWidth <= 768; }

function switchTab(tab) {
  document.body.setAttribute('data-tab', tab);
  document.querySelectorAll('.m-tab').forEach(function(el) {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  if (tab !== 'map') closeSheet();
  if (tab === 'map' && map) setTimeout(function(){ kakao.maps.event.trigger(map,'resize'); }, 50);
  if (tab === 'filter') updateApplyCount();
}

/* ── 빠른 필터 칩 ─────────────────────────────── */
var CHIP_DEFS = [
  {key:'all',label:'전체'},{key:'orange',label:'오늘신규'},
  {key:'blue',label:'진행중'},{key:'red',label:'30일내'},{key:'purple',label:'7일이내'},
];
var activeChip = 'all';

function buildChips() {
  var el = document.getElementById('m-chips');
  if (!el) return;
  el.innerHTML = '';
  CHIP_DEFS.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'm-chip' + (c.key === activeChip ? ' active' : '');
    btn.textContent = c.label;
    btn.setAttribute('data-chip', c.key);
    el.appendChild(btn);
  });
  el.onclick = function(e) {
    var b = e.target.closest('.m-chip');
    if (b) selectChip(b.getAttribute('data-chip'));
  };
}

function selectChip(key) {
  activeChip = key;
  buildChips();
  document.querySelectorAll('.cb-color').forEach(function(cb){ cb.checked = (key==='all'||cb.value===key); });
  applyFilter();
}

/* ── 필터 적용 카운트 ─────────────────────────── */
function updateApplyCount() {
  var btn = document.getElementById('m-apply-btn');
  if (btn) btn.textContent = '적용 ('+filtered.length+'건)';
}
function mobileApply() { applyFilter(); switchTab('map'); }
function mobileReset() { activeChip='all'; resetFilter(); buildChips(); }

/* ── 슬라이드업 시트 ──────────────────────────── */
function openPvctSheet(it, rows, url) {
  var sheet = document.getElementById('m-sheet');
  if (!sheet) return;
  document.getElementById('m-sheet-scroll').innerHTML =
    '<div class="d-title" style="color:#1a7a46;margin-bottom:10px;">◆ 수의계약 가능<br>' + esc(it.name) + '</div>'
    + rows.filter(function(r){return r[1]&&r[1]!=='-'&&r[1]!=='undefined';})
         .map(function(r){return '<div class="d-row"><span class="d-lbl">'+esc(r[0])+'</span><span class="d-val">'+val(r[1])+'</span></div>';}).join('')
    + '<a href="'+url+'" target="_blank" rel="noopener" class="btn-ob" style="background:#27ae60;">온비드에서 보기 →</a>';
  sheet.style.height = '55vh';
  sheet.classList.add('open');
  if (map && it.lat && it.lng) map.panTo(new kakao.maps.LatLng(it.lat, it.lng));
  switchTab('map');
}

function openLttrsSheet(it, rows, url) {
  var sheet = document.getElementById('m-sheet');
  if (!sheet) return;
  document.getElementById('m-sheet-scroll').innerHTML =
    '<div class="d-title" style="margin-bottom:10px;">★ ' + esc(it.name) + '</div>'
    + rows.filter(function(r){return r[1]&&r[1]!=='-';})
         .map(function(r){return '<div class="d-row"><span class="d-lbl">'+esc(r[0])+'</span><span class="d-val">'+val(r[1])+'</span></div>';}).join('')
    + '<div style="font-size:10px;color:#999;padding:4px 0;">※ 실제 낙찰가는 온비드에서 확인하세요</div>'
    + '<a href="'+url+'" target="_blank" rel="noopener" class="btn-ob">온비드에서 보기 →</a>';
  sheet.style.height = '50vh';
  sheet.classList.add('open');
  if (map && it.lat && it.lng) map.panTo(new kakao.maps.LatLng(it.lat, it.lng));
  switchTab('map');
}

function openSheet(it) {
  var sheet = document.getElementById('m-sheet');
  if (!sheet) return;
  document.getElementById('m-sheet-scroll').innerHTML = buildSheetContent(it);
  sheet.style.height = '50vh';
  sheet.classList.add('open');
}
function closeSheet() {
  var s = document.getElementById('m-sheet');
  if (s) s.classList.remove('open');
}
function buildSheetContent(it) {
  var url = it.onbid_no
    ? 'https://www.onbid.co.kr/op/cta/cltragent/collateralLots/collateralLotsDetail.do?cltrNo='+encodeURIComponent(it.onbid_no)
    : 'https://www.onbid.co.kr';
  var price = it.min_bid ? fmtAmt(it.min_bid) : (it.min_bid_str||'-');
  var addr = [it.sido,it.sigungu,it.emd].filter(Boolean).join(' ');
  var use  = [it.use_lv1,it.use_lv2,it.use_lv3].filter(Boolean).join(' > ');
  var dr = discRate(it);
  var dc = discColor(dr);
  var minPct = (it.appraisal&&it.min_bid) ? Math.max(0,Math.min(100,it.min_bid/it.appraisal*100)).toFixed(1) : '0';
  var discLabel = dr!=null ? ' (-'+dr.toFixed(1)+'%)' : '';
  var priceBar = (it.appraisal&&it.min_bid)
    ? '<div class="dpb-wrap">'
      +'<div class="dpb-row"><span class="dpb-lbl">감정가</span>'
      +'<div class="dpb-bar-bg"><div class="dpb-bar-fg" style="width:100%;background:#1a73e8"></div></div>'
      +'<span class="dpb-val">'+fmtAmt(it.appraisal)+'</span></div>'
      +'<div class="dpb-row"><span class="dpb-lbl">최저가</span>'
      +'<div class="dpb-bar-bg"><div class="dpb-bar-fg" style="width:'+minPct+'%;background:'+dc+'"></div></div>'
      +'<span class="dpb-val" style="color:'+dc+';font-weight:bold;">'+fmtAmt(it.min_bid)+discLabel+'</span></div>'
      +'</div>' : '';
  var rows = [['소재지',addr],
    ['유찰횟수',it.unsold_cnt!=null?it.unsold_cnt+'회':null],
    ['입찰기간',(it.bid_start||'-')+' ~ '+(it.bid_end||'-')],
    ['입찰상태',it.status],['용도',use]].filter(function(r){return r[1];});
  return '<div style="font-size:15px;font-weight:bold;color:#1a1a2e;margin-bottom:8px;line-height:1.4;">'+esc(it.name)+'</div>'
    + priceBar
    +rows.map(function(r){return '<div class="d-row"><span class="d-lbl">'+esc(r[0])+'</span><span class="d-val">'+val(r[1])+'</span></div>';}).join('')
    +'<a href="'+url+'" target="_blank" rel="noopener" class="btn-ob" style="margin-top:14px;padding:16px;font-size:15px;">온비드에서 보기 &rarr;</a>';
}

/* ── 시트 드래그 ──────────────────────────────── */
(function(){
  var startY=0,startH=0,drag=false;
  document.addEventListener('DOMContentLoaded',function(){
    var handle=document.getElementById('m-sheet-handle'), sheet=document.getElementById('m-sheet');
    if(!handle||!sheet) return;
    handle.addEventListener('touchstart',function(e){startY=e.touches[0].clientY;startH=sheet.offsetHeight;drag=true;sheet.style.transition='none';e.preventDefault();},{passive:false});
    document.addEventListener('touchmove',function(e){if(!drag)return;sheet.style.height=Math.max(80,Math.min(window.innerHeight*.92,startH-(e.touches[0].clientY-startY)))+'px';e.preventDefault();},{passive:false});
    document.addEventListener('touchend',function(){if(!drag)return;drag=false;sheet.style.transition='';var h=sheet.offsetHeight,wh=window.innerHeight;if(h<wh*.25)closeSheet();else if(h>wh*.65)sheet.style.height='90vh';else sheet.style.height='50vh';});
  });
})();
