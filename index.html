  var PW = '260331';
  if (!PW) return;
  if (sessionStorage.getItem('onbid_auth') === PW) return;
  var overlay = document.getElementById('pw-overlay');
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  window.checkPw = function() {
    var v = document.getElementById('pw-input').value;
    if (v === PW) {
      sessionStorage.setItem('onbid_auth', PW);
      overlay.style.display = 'none';
      document.body.style.overflow = '';

      document.getElementById('pw-err').textContent = '비밀번호가 틀렸습니다';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  };
  setTimeout(function() { document.getElementById('pw-input').focus(); }, 100);
})();

const TODAY_STR = '2026-06-17';
const TODAY = new Date(TODAY_STR + 'T00:00:00');
const COLORS = {purple:'#9b30ff', blue:'#1a73e8', red:'#e74c3c', black:'#555555'};

let map, markers = [], tips = [], filtered = ITEMS.slice(), selId = null;

/* ── 유틸 ─────────────────────────────────────── */
function fmtAmt(v) {
  if (v == null) return '-';
  const e = Math.floor(v / 1e8);
  const m = Math.round((v % 1e8) / 1e4);
  if (e > 0 && m > 0) return e.toLocaleString() + '억 ' + m.toLocaleString() + '만원';
  if (e > 0) return e.toLocaleString() + '억원';
  return Math.round(v / 1e4).toLocaleString() + '만원';
}
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function val(v) { return (v == null || v === '') ? '-' : esc(String(v)); }

/* ── 통계 ─────────────────────────────────────── */
function updateStats(items) {
  document.getElementById('s-total').textContent    = items.length;
  document.getElementById('s-active').textContent   = items.filter(i=>i.color==='blue').length;
  document.getElementById('s-upcoming').textContent = items.filter(i=>i.color==='red').length;
  document.getElementById('s-new').textContent      = items.filter(i=>i.color==='purple').length;
  document.getElementById('list-cnt').textContent   = items.length;
}

/* ── 필터 초기화 ──────────────────────────────── */
function buildCbs(elId, values, cls) {
  const el = document.getElementById(elId);
  el.innerHTML = '';
  values.forEach(v => {
    const lbl = document.createElement('label');
    lbl.className = 'cb-item';
    lbl.innerHTML = '<input type="checkbox" class="' + cls + '" value="' + esc(v) + '" checked> ' + esc(v);
    el.appendChild(lbl);
  });
}

function initFilters() {
  const types = [...new Set(ITEMS.map(i=>i.prpt_type).filter(Boolean))].sort();
  const stats = [...new Set(ITEMS.map(i=>i.status).filter(Boolean))].sort();
  const use2s = [...new Set(ITEMS.map(i=>i.use_lv2).filter(Boolean))].sort();
  buildCbs('f-type',   types, 'cb-type');
  buildCbs('f-status', stats, 'cb-status');
  buildCbs('f-use2',   use2s, 'cb-use2');
}

/* ── 필터 적용 ────────────────────────────────── */
function applyFilter() {
  const types = [...document.querySelectorAll('.cb-type:checked')].map(e=>e.value);
  const stats = [...document.querySelectorAll('.cb-status:checked')].map(e=>e.value);
  const use2s = [...document.querySelectorAll('.cb-use2:checked')].map(e=>e.value);
  const minA  = (parseFloat(document.getElementById('f-min').value)||0) * 1e8;
  const maxA  = (parseFloat(document.getElementById('f-max').value)||0) * 1e8;
  filtered = ITEMS.filter(i => {
    if (types.length && !types.includes(i.prpt_type)) return false;
    if (stats.length && !stats.includes(i.status))    return false;
    if (use2s.length && !use2s.includes(i.use_lv2))   return false;
    if (minA > 0 && (i.appraisal||0) < minA) return false;
    if (maxA > 0 && (i.appraisal||0) > maxA) return false;
    return true;
  });
  renderAll();
}

function resetFilter() {
  document.getElementById('f-min').value = '';
  document.getElementById('f-max').value = '';
  document.querySelectorAll('.cb-type,.cb-status,.cb-use2').forEach(cb=>cb.checked=true);
  filtered = ITEMS.slice();
  renderAll();
}

/* ── 목록 렌더링 ──────────────────────────────── */
function renderList(items) {
  const sorted = [...items].sort((a,b) => {
    if (!a.bid_start && !b.bid_start) return 0;
    if (!a.bid_start) return 1;
    if (!b.bid_start) return -1;
    return a.bid_start.localeCompare(b.bid_start);
  });
  document.getElementById('item-list').innerHTML = sorted.map(it => {
    const col = COLORS[it.color] || '#555';
    const dateStr = it.bid_start
      ? it.bid_start.slice(0,10) + ' ~ ' + (it.bid_end ? it.bid_end.slice(0,10) : '-')
      : '';
    const price = it.min_bid ? fmtAmt(it.min_bid) : (it.min_bid_str || '-');
    return '<div class="card' + (it.id===selId?' sel':'') + '" id="card-' + it.id + '" onclick="selectItem(' + it.id + ')">'
      + '<div class="c-bar" style="background:' + col + '"></div>'
      + '<div class="c-body">'
      + '<div class="c-name">' + esc(it.name) + '</div>'
      + '<div class="c-meta">' + esc(it.sido) + ' ' + esc(it.sigungu) + ' &middot; ' + esc(it.prpt_type) + ' &middot; ' + esc(it.status) + '</div>'
      + '<div class="c-price">감정가 ' + fmtAmt(it.appraisal) + ' / 최저 ' + price + '</div>'
      + '<div class="c-meta">' + esc(dateStr) + '</div>'
      + '</div></div>';
  }).join('');
}

/* ── 상세 패널 ────────────────────────────────── */
function closeDetail() {
  selId = null;
  document.getElementById('detail-ph').style.display = 'block';
  document.getElementById('detail-body').style.display = 'none';
  document.getElementById('detail-hdr').style.display = 'none';
  document.querySelectorAll('.card').forEach(el=>el.classList.remove('sel'));
}

    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
    new kakao.maps.Size(22, 30),
    {offset: new kakao.maps.Point(11, 30)}
  );
}

function clearMarkers() {
  markers.forEach(m=>m.setMap(null));
  tips.forEach(t=>t.setMap(null));
  markers=[]; tips=[];
}

function renderMarkers(items) {
  clearMarkers();
  items.forEach(it => {
    if (!it.lat || !it.lng) return;
    const pos = new kakao.maps.LatLng(it.lat, it.lng);
    const mk = new kakao.maps.Marker({
      position: pos,
      image: mkImg(COLORS[it.color]||'#555'),
      map: map,
    });
    const tip = new kakao.maps.CustomOverlay({
      position: pos,
      content: '<div style="background:rgba(0,0,0,.8);color:#fff;padding:3px 8px;border-radius:4px;font-size:11px;white-space:nowrap;pointer-events:none;font-family:Malgun Gothic,sans-serif;">' + esc(it.name) + '</div>',
      yAnchor: 2.1,
    });
    kakao.maps.event.addListener(mk, 'mouseover', function(){ tip.setMap(map); });
    kakao.maps.event.addListener(mk, 'mouseout',  function(){ tip.setMap(null); });
    kakao.maps.event.addListener(mk, 'click',     function(){ selectItem(it.id); });
    markers.push(mk);
    tips.push(tip);
  });
}

/* ── 선택 ─────────────────────────────────────── */
function selectItem(id) {
  selId = id;
  const it = ITEMS.find(i=>i.id===id);
  if (!it) return;
  document.querySelectorAll('.card').forEach(el=>el.classList.remove('sel'));
  const card = document.getElementById('card-'+id);
  if (card) { card.classList.add('sel'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  if (map && it.lat && it.lng) map.panTo(new kakao.maps.LatLng(it.lat, it.lng));
  showDetail(it);
}

/* ── 전체 렌더 ────────────────────────────────── */
function renderAll() {
  updateStats(filtered);
  renderList(filtered);
  renderMarkers(filtered);
}

/* ── 데이터 렌더 (지도와 독립) ────────────────── */
function initData() {
  initFilters();
  updateStats(ITEMS);
  renderList(ITEMS);
}

/* ── 지도 초기화 ──────────────────────────────── */
function initMap() {
  if (typeof kakao === 'undefined' || !kakao.maps) {
    document.getElementById('map').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:8px;color:#999;font-size:13px;">'
      + '<div>카카오 지도를 불러오지 못했습니다.</div>'
      + '<div style="font-size:11px;">카카오 개발자센터에서 JavaScript 키의 허용 도메인에<br>이 파일의 경로 또는 localhost를 추가하세요.</div>'
      + '</div>';
    return;
  }
  kakao.maps.load(function() {
    map = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(36.5, 127.8),
      level: 8,
    });
    renderMarkers(filtered);
  });
}

/* ── 로드뷰 ───────────────────────────────────── */
var rvOn = false, rvClient = null, rvObj = null, rvMarker = null, rvListener = null;

function toggleRV() {
  rvOn = !rvOn;
  var btn   = document.getElementById('rv-btn');
  var panel = document.getElementById('rv-panel');
  var badge = document.getElementById('rv-hint-badge');
  var mapEl = document.getElementById('map');

  if (rvOn) {
    btn.classList.add('active');
    panel.style.display = 'flex';
    badge.style.display = 'block';
    mapEl.style.cursor = 'crosshair';

    if (!rvClient) {
      rvClient = new kakao.maps.RoadviewClient();
      rvObj    = new kakao.maps.Roadview(document.getElementById('roadview'));
    }
    rvListener = kakao.maps.event.addListener(map, 'click', function(e) {
      showRV(e.latLng);
    });
  } else {
    btn.classList.remove('active');
    panel.style.display = 'none';
    badge.style.display = 'none';
    mapEl.style.cursor = '';
    if (rvListener) { kakao.maps.event.removeListener(rvListener); rvListener = null; }
    if (rvMarker)   { rvMarker.setMap(null); rvMarker = null; }
  }
}

function showRV(latlng) {
  document.getElementById('rv-hint-badge').style.display = 'none';
  rvClient.getNearestPanoId(latlng, 50, function(panoId) {
    var label = document.getElementById('rv-label');
    if (panoId === null) {
      label.textContent = '⚠ 해당 위치에 로드뷰가 없습니다 (반경 50m)';
    } else {
      rvObj.setPanoId(panoId, latlng);
      label.textContent = '📷 로드뷰';
      if (!rvMarker) {
        rvMarker = new kakao.maps.Marker({ map: map, position: latlng });
      } else {
        rvMarker.setPosition(latlng);
      }
    }
  });
}

/* ── 지적편집도 ───────────────────────────────── */
var cadastralOn = false;
function toggleCadastral() {
  if (!map) return;
  cadastralOn = !cadastralOn;
  var btn = document.getElementById('cadastral-btn');
  if (cadastralOn) {
    map.addOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);
    btn.classList.add('active');
  } else {
    map.removeOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);
    btn.classList.remove('active');
  }
}

/* ── 위성지도 ─────────────────────────────────── */
var satelliteOn = false;
function toggleSatellite() {
  if (!map) return;
  satelliteOn = !satelliteOn;
  var btn = document.getElementById('satellite-btn');
  if (satelliteOn) {
    map.setMapTypeId(kakao.maps.MapTypeId.HYBRID);
    btn.classList.add('active');
    btn.textContent = '🗺 일반지도';
  } else {
    map.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);
    btn.classList.remove('active');
    btn.textContent = '🛰 위성지도';
  }
}

/* ── 주소 검색 ────────────────────────────────── */
function searchAddr() {
  var q = document.getElementById('map-search-input').value.trim();
  var msg = document.getElementById('map-search-msg');
  msg.style.display = 'none';
  if (!q || !map) return;

  function showMsg(txt) {
    msg.textContent = txt;
    msg.style.display = 'block';
    setTimeout(function(){ msg.style.display = 'none'; }, 3000);
  }

  // 1차: 주소 검색
  var gc = new kakao.maps.services.Geocoder();
  gc.addressSearch(q, function(result, status) {
    if (status === kakao.maps.services.Status.OK) {
      map.setCenter(new kakao.maps.LatLng(result[0].y, result[0].x));
      map.setLevel(4);
    } else {
      // 2차: 키워드(장소명) 검색
      var ps = new kakao.maps.services.Places();
      ps.keywordSearch(q, function(data, status2) {
        if (status2 === kakao.maps.services.Status.OK) {
          map.setCenter(new kakao.maps.LatLng(data[0].y, data[0].x));
          map.setLevel(4);
        } else {
          showMsg('검색 결과가 없습니다: ' + q);
        }
      });
    }
  });
}

/* ── 시작 ─────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function() {
  initData();
  var sdk = document.createElement('script');
  sdk.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=6d116c086c4ff7a2cca0b3d09357116b&autoload=false&libraries=services';
  sdk.onload = function() { initMap(); };
  sdk.onerror = function() { initMap(); };
  document.head.appendChild(sdk);
});
</script>
